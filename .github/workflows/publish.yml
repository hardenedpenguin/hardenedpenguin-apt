name: Publish APT repository

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'keyring/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      sync_supermon:
        description: Also download supermon-ng release .debs (when published on GitHub Releases)
        type: boolean
        default: false
      release_tag:
        description: Optional tag for synced releases (empty = latest per repo)
        type: string
        default: ''
  repository_dispatch:
    types: [publish-debs]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-apt-repo
  cancel-in-progress: false

env:
  REPO_NAME: hardenedpenguin
  # morph027/apt-repo-action appends "-keyring" to this name
  KEYRING_NAME: hardenedpenguin-archive
  CODENAME: stable
  COMPONENTS: main
  # Do not list "all" — reprepro rejects it; Architecture: all packages still work
  ARCHITECTURES: amd64 arm64
  REPO_BASE_URL: https://hardenedpenguin.github.io/hardenedpenguin-apt/

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      keyring: ${{ steps.create-apt-repo.outputs.keyring }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg curl jq

      - name: Sync GitHub release packages
        run: |
          tag="${{ inputs.release_tag || github.event.client_payload.release_tag || '' }}"
          chmod +x scripts/sync-github-release.sh
          sync_repo() {
            if [[ -n "$tag" ]]; then
              ./scripts/sync-github-release.sh "$1" "$tag"
            else
              ./scripts/sync-github-release.sh "$1"
            fi
          }
          sync_repo hardenedpenguin/SkywarnPlus-NG
          sync_repo hardenedpenguin/saytime_weather_rb
          sync_repo hardenedpenguin/sayip-reboot-halt-saypublicip
          sync_repo hardenedpenguin/internet_monitor_rb

      - name: Sync supermon-ng release assets
        if: >-
          inputs.sync_supermon == true ||
          github.event.client_payload.sync_supermon == true
        run: |
          tag="${{ inputs.release_tag || github.event.client_payload.release_tag || '' }}"
          chmod +x scripts/sync-github-release.sh
          if [[ -n "$tag" ]]; then
            ./scripts/sync-github-release.sh hardenedpenguin/supermon-ng "$tag"
          else
            ./scripts/sync-github-release.sh hardenedpenguin/supermon-ng
          fi

      - name: Copy dispatched .deb URLs
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.deb_urls
        env:
          DEB_URLS: ${{ toJson(github.event.client_payload.deb_urls) }}
        run: |
          mkdir -p packages
          echo "$DEB_URLS" | jq -r '.[]' | while read -r url; do
            fname="$(basename "$url")"
            echo "Fetching $fname ..."
            curl -fsSL -o "packages/$fname" "$url"
          done

      - name: Verify packages present
        run: |
          shopt -s nullglob
          debs=(packages/*.deb)
          if ((${#debs[@]} == 0)); then
            echo "No .deb files in packages/. Release sync should have run; check earlier steps." >&2
            exit 1
          fi
          ls -lh packages/*.deb

      - name: Build archive keyring package
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          chmod +x keyring/build.sh
          ./keyring/build.sh packages

      - name: Create APT repository
        id: create-apt-repo
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: ${{ env.REPO_NAME }}
          keyring-name: ${{ env.KEYRING_NAME }}
          origin: Hardened Penguin
          label: Hardened Penguin APT Repository
          suite: stable
          codename: ${{ env.CODENAME }}
          components: ${{ env.COMPONENTS }}
          architectures: ${{ env.ARCHITECTURES }}
          scan-dir: ./packages
          signing-key: ${{ secrets.GPG_PRIVATE_KEY }}
          maintainer: Jory A. Pratt, W5GLE <geekypenguin@gmail.com>
          homepage: https://github.com/hardenedpenguin/hardenedpenguin-apt
          import-from-repo-url: |
            deb-amd64 ${{ env.REPO_BASE_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}
            deb-arm64 ${{ env.REPO_BASE_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}
          import-from-repo-failure-allow: true

      - name: Add landing page and pubkey
        run: |
          cp public/index.html "${{ steps.create-apt-repo.outputs.dir }}/index.html"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --armor --export "${{ vars.GPG_KEY_ID }}" > "${{ steps.create-apt-repo.outputs.dir }}/pubkey.asc"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.create-apt-repo.outputs.dir }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: echo "Published to ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
