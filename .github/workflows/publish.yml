# Publish the signed APT repository to GitHub Pages.
#
# Prerequisites (one-time, repo admin):
#   1. Settings → Pages → Build and deployment → Source: GitHub Actions
#   2. Settings → Secrets and variables → Actions:
#        Secret   GPG_PRIVATE_KEY  — armored private signing key
#        Variable GPG_KEY_ID         — 40-character key fingerprint
#
# Triggers:
#   - Push to main when packages/*.deb change
#   - Manual workflow_dispatch (optional sync from GitHub releases first)
#   - repository_dispatch from other repos (event type: publish-debs)

name: Publish APT repository

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'conf/**'
      - 'public/**'
      - 'keyring/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      sync_skywarnplus:
        description: Download SkywarnPlus-NG release .debs before publish
        type: boolean
        default: false
      sync_supermon:
        description: Download supermon-ng release .debs before publish
        type: boolean
        default: false
      release_tag:
        description: Optional tag for synced releases (empty = latest)
        type: string
        default: ''
  repository_dispatch:
    types: [publish-debs]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-apt-repo
  cancel-in-progress: false

env:
  REPO_NAME: hardenedpenguin
  KEYRING_NAME: hardenedpenguin-archive-keyring
  CODENAME: stable
  COMPONENTS: main
  ARCHITECTURES: amd64 arm64 all
  REPO_BASE_URL: https://hardenedpenguin.github.io/hardenedpenguin-apt/

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      keyring: ${{ steps.create-apt-repo.outputs.keyring }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg curl jq

      - name: Sync SkywarnPlus-NG release assets
        if: >-
          inputs.sync_skywarnplus == true ||
          github.event.client_payload.sync_skywarnplus == true
        run: |
          tag="${{ inputs.release_tag || github.event.client_payload.release_tag || '' }}"
          chmod +x scripts/sync-github-release.sh
          if [[ -n "$tag" ]]; then
            ./scripts/sync-github-release.sh hardenedpenguin/SkywarnPlus-NG "$tag"
          else
            ./scripts/sync-github-release.sh hardenedpenguin/SkywarnPlus-NG
          fi

      - name: Sync supermon-ng release assets
        if: >-
          inputs.sync_supermon == true ||
          github.event.client_payload.sync_supermon == true
        run: |
          tag="${{ inputs.release_tag || github.event.client_payload.release_tag || '' }}"
          chmod +x scripts/sync-github-release.sh
          if [[ -n "$tag" ]]; then
            ./scripts/sync-github-release.sh hardenedpenguin/supermon-ng "$tag"
          else
            ./scripts/sync-github-release.sh hardenedpenguin/supermon-ng
          fi

      - name: Copy dispatched .deb URLs
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.deb_urls
        env:
          DEB_URLS: ${{ toJson(github.event.client_payload.deb_urls) }}
        run: |
          mkdir -p packages
          echo "$DEB_URLS" | jq -r '.[]' | while read -r url; do
            fname="$(basename "$url")"
            echo "Fetching $fname ..."
            curl -fsSL -o "packages/$fname" "$url"
          done

      - name: Verify packages present
        run: |
          shopt -s nullglob
          debs=(packages/*.deb)
          if ((${#debs[@]} == 0)); then
            echo "No .deb files in packages/. Add files locally or enable sync inputs." >&2
            exit 1
          fi
          ls -lh packages/*.deb

      - name: Create APT repository
        id: create-apt-repo
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: ${{ env.REPO_NAME }}
          keyring-name: ${{ env.KEYRING_NAME }}
          origin: Hardened Penguin
          label: Hardened Penguin APT Repository
          suite: stable
          codename: ${{ env.CODENAME }}
          components: ${{ env.COMPONENTS }}
          architectures: ${{ env.ARCHITECTURES }}
          scan-dir: ./packages
          signing-key: ${{ secrets.GPG_PRIVATE_KEY }}
          maintainer: Jory A. Pratt, W5GLE <geekypenguin@gmail.com>
          homepage: https://github.com/hardenedpenguin/hardenedpenguin-apt
          import-from-repo-url: |
            deb-amd64 ${{ env.REPO_BASE_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}
            deb-arm64 ${{ env.REPO_BASE_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}
            deb-all ${{ env.REPO_BASE_URL }} ${{ env.CODENAME }} ${{ env.COMPONENTS }}
          import-from-repo-failure-allow: true

      - name: Add landing page and pubkey
        run: |
          cp public/index.html "${{ steps.create-apt-repo.outputs.dir }}/index.html"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --armor --export "${{ vars.GPG_KEY_ID }}" > "${{ steps.create-apt-repo.outputs.dir }}/pubkey.asc"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.create-apt-repo.outputs.dir }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          {
            echo '## APT repository published'
            echo
            echo '**One-time setup on each node:**'
            echo '```bash'
            echo 'curl -fsSLO ${{ steps.deployment.outputs.page_url }}pool/main/h/hardenedpenguin-archive-keyring/hardenedpenguin-archive-keyring_1.0_all.deb'
            echo 'sudo apt install ./hardenedpenguin-archive-keyring_1.0_all.deb'
            echo 'sudo apt update'
            echo '```'
            echo
            echo '**Install packages:**'
            echo '```bash'
            echo 'sudo apt install skywarnplus-ng-all supermon-ng'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
